name: Fetch GitHub Traffic

on:
  schedule:
    - cron: '0 17 */13 * *' # Run at 17:00 UTC (10:30 PM IST) every 13 days
  workflow_dispatch:

jobs:
  fetch-traffic:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gitlytics

      - name: Run gitlytics sync
        env:
          GITHUB_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: gitlytics sync --data-dir data/

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Traffic update $(date -u +'%Y-%m-%d')" && git push)
